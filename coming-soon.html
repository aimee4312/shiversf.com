<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIVER — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Viaoda+Libre&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Outfit",sans-serif;background:#e4ebee;color:#111;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
:root{--blue:#223f9a;--blue-mid1:#4e64a7;--blue-mid2:#6e7fb0;--bg:#e4ebee;--white:#ffffff;--gray:#6b7a99;--border:rgba(34,63,154,0.15);}
a{color:inherit;text-decoration:none;}

/* NAV */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  padding:20px 48px;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;
  transition:background 0.35s,box-shadow 0.35s;
}
#nav.scrolled{
  background:rgba(228,235,238,0.97);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 1px 0 rgba(34,63,154,0.12);
}
.nav-back{font-size:10.5px;letter-spacing:0.10em;text-transform:uppercase;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:6px;}
.nav-back::before{content:'←';font-size:13px;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-brand-logo{width:28px;opacity:0.92}
.nav-brand-text{font-family:"Viaoda Libre",Georgia,serif;font-size:16px;font-weight:700;letter-spacing:0.50em;text-indent:0.50em;color:var(--blue);}
.nav-season{font-size:10.5px;letter-spacing:0.06em;color:var(--blue);text-align:right;}

/* HERO */
.city-hero{
  min-height:100vh;
  background:linear-gradient(160deg,var(--blue) 0%,#4e64a7 55%,#6e7fb0 100%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 48px 80px;
  position:relative;overflow:hidden;
}
.city-hero::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.22) 100%);
  pointer-events:none;
}
.hero-subtitle{
  font-size:11px;letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);margin-bottom:16px;
  position:relative;z-index:1;
}
.hero-title{
  font-family:"Viaoda Libre",Georgia,serif;
  font-size:clamp(72px,12vw,160px);
  font-weight:400;font-style:italic;
  color:#fff;line-height:0.88;
  letter-spacing:-0.02em;
  position:relative;z-index:1;
}
.hero-season{
  font-family:"Viaoda Libre",Georgia,serif;
  font-size:clamp(18px,2.2vw,28px);
  color:rgba(255,255,255,0.7);
  margin-top:16px;letter-spacing:0.04em;
  position:relative;z-index:1;
}

/* CONTENT */
.city-content{
  padding:108px 48px;
  background:var(--white);
}
.content-grid{
  display:grid;grid-template-columns:180px 1fr;gap:52px;
  align-items:start;
}
.content-label{
  font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--gray);padding-top:6px;
}
.content-body{
  font-size:16px;line-height:2.0;color:#3a4a6a;max-width:620px;
}

/* GALLERY PLACEHOLDER */
.city-gallery{
  padding:0 48px 108px;background:var(--white);
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
}
.gallery-card{
  aspect-ratio:3/4;
  background:linear-gradient(155deg,#c8d4e0,#dce4ec);
  display:flex;align-items:flex-end;padding:18px;
}
.gallery-card:nth-child(2){background:linear-gradient(155deg,#bccad8,#ccd6e4)}
.gallery-card:nth-child(3){background:linear-gradient(155deg,#d0dae6,#e0e8f0)}
.gallery-label{
  font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--blue);opacity:0.6;font-family:"Outfit",sans-serif;font-weight:600;
}

/* FOOTER */
footer{
  background:var(--blue);color:white;
  padding:48px;
  display:flex;align-items:center;justify-content:space-between;
}
.ft-brand{font-family:"Viaoda Libre",Georgia,serif;font-size:20px;font-weight:700;letter-spacing:0.44em;text-indent:0.38em;}
.ft-back{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.6;cursor:pointer;transition:opacity 0.2s;}
.ft-back:hover{opacity:1}

@media(max-width:680px){
  #nav{padding:17px 22px}
  .city-hero{padding:0 22px 60px}
  .city-content{padding:76px 22px}
  .content-grid{grid-template-columns:1fr;gap:20px}
  .city-gallery{padding:0 22px 76px;grid-template-columns:1fr 1fr}
  footer{padding:32px 22px;flex-direction:column;gap:16px;text-align:center}
}
</style>
</head>
